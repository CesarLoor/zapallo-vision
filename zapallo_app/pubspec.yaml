name: zapallo_app
description: "Detector móvil de enfermedades foliares en zapallo - ZapalloAI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Cámara
  camera: ^0.11.0+2

  # Almacenamiento
  path_provider: ^2.1.4
  path: ^1.9.0

  # Base de datos (Drift/SQLite ORM)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.0

  # IDs únicos
  uuid: ^4.5.1

  # Fecha/hora
  intl: ^0.19.0

  # Procesamiento de imágenes (blur + brillo)
  image: ^4.5.0

  # Permisos
  permission_handler: ^11.3.1

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Navegación
  go_router: ^14.6.2

  # UI extras
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
